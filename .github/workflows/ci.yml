name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # CPU-only torch first to keep CI fast (no CUDA runner needed)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # Dev tools (kept out of requirements.txt)
          pip install "pytest>=8.2.0" "ruff>=0.4.0"

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests (CPU-only, GPU tests auto-skipped)
        run: pytest tests/ -v --tb=short

      - name: Smoke-test benchmark sweep (quick CPU)
        run: python -m src.bench.run_sweep --device cpu --quick
